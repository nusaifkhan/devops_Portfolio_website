    function useTypewriter(strings, speed = 60, pause = 2000) {
      const [display, setDisplay] = useState("");
      const [idx, setIdx] = useState(0);
      const [charIdx, setCharIdx] = useState(0);
      const [deleting, setDeleting] = useState(false);

      useEffect(() => {
        const current = strings[idx];
        let timeout;
        if (!deleting && charIdx < current.length) {
          timeout = setTimeout(() => setCharIdx((c) => c + 1), speed);
        } else if (!deleting && charIdx === current.length) {
          timeout = setTimeout(() => setDeleting(true), pause);
        } else if (deleting && charIdx > 0) {
          timeout = setTimeout(() => setCharIdx((c) => c - 1), speed / 2);
        } else {
          setDeleting(false);
          setIdx((i) => (i + 1) % strings.length);
        }
        setDisplay(current.slice(0, charIdx));
        return () => clearTimeout(timeout);
      }, [charIdx, deleting, idx, strings, speed, pause]);

      return display;
    }

    function useFadeIn() {
      useEffect(() => {
        const obs = new IntersectionObserver(
          (entries) => {
            entries.forEach((e, i) => {
              if (e.isIntersecting) {
                setTimeout(() => e.target.classList.add("vis"), i * 80);
              }
            });
          },
          { threshold: 0.1 },
        );
        document.querySelectorAll(".fade").forEach((el) => obs.observe(el));
        return () => obs.disconnect();
      }, []);
    }

    function ContactForm() {
      const [form, setForm] = useState({
        name: "",
        email: "",
        subject: "",
        message: "",
      });
      const [status, setStatus] = useState(null); // null | 'sending' | 'ok' | 'err'
      const [statusMsg, setStatusMsg] = useState("");

      const handleChange = (e) =>
        setForm((f) => ({ ...f, [e.target.name]: e.target.value }));

      const handleSubmit = async () => {
        if (!form.name || !form.email || !form.message) {
          setStatus("err");
          setStatusMsg("Please fill in all required fields.");
          return;
        }
        setStatus("sending");
        try {
          const res = await fetch("http://localhost:3001/api/contact", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(form),
          });
          const data = await res.json();
          if (res.ok) {
            setStatus("ok");
            setStatusMsg(
              data.message ||
              `✓ Message received! Nusaif will get back to you at ${form.email} shortly.`,
            );
            setForm({ name: "", email: "", subject: "", message: "" });
          } else {
            setStatus("err");
            setStatusMsg(
              data.error ||
              "Something went wrong. Please try emailing directly.",
            );
          }
        } catch (err) {
          setStatus("err");
          setStatusMsg(
            "Could not reach the server. Please email nusaifkhan21@gmail.com directly.",
          );
        }
      };

      return (
        <div className="msg-form fade delay3">
          <h3>Send a Message</h3>
          <div className="form-row">
            <div className="form-group">
              <label>Name *</label>
              <input
                name="name"
                value={form.name}
                onChange={handleChange}
                placeholder="Your name"
              />
            </div>
            <div className="form-group">
              <label>Email *</label>
              <input
                name="email"
                type="email"
                value={form.email}
                onChange={handleChange}
                placeholder="your@email.com"
              />
            </div>
          </div>
          <div className="form-group">
            <label>Subject</label>
            <input
              name="subject"
              value={form.subject}
              onChange={handleChange}
              placeholder="DevOps Internship Opportunity"
            />
          </div>
          <div className="form-group">
            <label>Message *</label>
            <textarea
              name="message"
              value={form.message}
              onChange={handleChange}
              placeholder="Hi Nusaif, I'd like to discuss..."
            ></textarea>
          </div>
          <button
            className="submit-btn"
            onClick={handleSubmit}
            disabled={status === "sending"}
          >
            {status === "sending" ? "⟳ Sending..." : "⟶ Send Message"}
          </button>
          {status && status !== "sending" && (
            <div className={`form-status ${status}`}>{statusMsg}</div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────

    function App() {
      const [scrolled, setScrolled] = useState(false);
      useFadeIn();

      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener("scroll", onScroll);
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      // Re-run fade observer after mount
      useEffect(() => {
        setTimeout(() => {
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e, i) => {
                if (e.isIntersecting)
                  setTimeout(() => e.target.classList.add("vis"), i * 80);
              });
            },
            { threshold: 0.08 },
          );
          document.querySelectorAll(".fade").forEach((el) => obs.observe(el));
        }, 200);
      }, []);

      const downloadCV = () => {
        const link = document.createElement("a");
        link.href = "Nusaif_Khan_Resume.pdf";
        link.download = "Nusaif_Khan_Resume.pdf";
        // If hosted, point to the actual file path
        // For local use, this downloads the same-directory PDF
        link.click();
        // Show feedback
        const notice = document.createElement("div");
        notice.style.cssText =
          "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#00ff88;color:#000;font-family:JetBrains Mono,monospace;font-size:.8rem;padding:12px 24px;border-radius:6px;z-index:9999;font-weight:700;letter-spacing:.08em";
        notice.textContent = "⬇ Downloading CV...";
        document.body.appendChild(notice);
        setTimeout(() => notice.remove(), 3000);
      };

      return (
        <>
          <Cursor />
          <Nav scrolled={scrolled} onDL={downloadCV} />
          <Hero onDL={downloadCV} />
          <SystemProfile />
          <Skills />
          <Projects />
          <Education />
          <Certs />
          <Footer />
        </>
      );
    }
